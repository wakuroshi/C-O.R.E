<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>C-O.R.E</title> 
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Press+Start+2P">
    <link rel="stylesheet" href="https://unpkg.com/nes.css/css/nes.min.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
  
  <div class="top">
    <div class="nes-container with-title">
      <p class="title">WELCOME TO C-O.R.E</p>
      <p>Customize your experience.</p>
    </div>
  </div>

  <div class="main">
    <div class="main-section" style="flex: 0 0 100%;"> 
      <div class="nes-container with-title">
        <p class="title">@root:.config/$</p>
        
        <div class="nes-field is-inline">
          <h3>CRT Filter:</h3>
            <label>
              <input type="checkbox" class="nes-checkbox" id="crt_toggle" checked />
              <span>ON</span>
            </label>
        </div>
        <p>
            Toggle scanlines, bloom, and color distortion.
        </p>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class=" footer-nav nes-container with-title is-centered"> 
      <p class="title">navbar</p>
        <a href="index.html" class="nav-item">HOME</a>
        <a href="theory.html" class="nav-item">THEORY</a>
        <a href="simulator.html" class="nav-item">SIMULATOR</a>
        <a href="about.html" class="nav-item">ABOUT</a>
    </div>
  </div>

  <script>
    const crtToggle = document.getElementById('crt_toggle');
    
    const isCrtEnabled = localStorage.getItem('crtEnabled') !== 'false';
    crtToggle.checked = isCrtEnabled;
    
    if (isCrtEnabled) {
      document.body.classList.add('crt-on');
    }

    crtToggle.addEventListener('change', () => {
      if (crtToggle.checked) {
        document.body.classList.add('crt-on');
        localStorage.setItem('crtEnabled', 'true');
      } else {
        document.body.classList.remove('crt-on');
        localStorage.setItem('crtEnabled', 'false');
      }
    });
  </script>

</body>
</html>
