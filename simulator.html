<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-O.R.E // Simulator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/nes.css/css/nes.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <style>
        #graph_canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: 100%;  
            height: 100%;
            display: block;
            cursor: crosshair;
        }
        .canvas-container {
            background-color: #F7F3E8;
            display: flex;
            flex: 1; 
            width: 100%;
            padding: 0; 
            box-sizing: border-box;
        }
    </style>
</head>
<body>
        <header class="top">
            <h1 class="nes-text is-primary">C-O.R.E // SIMULATOR</h1>
            <p>Graph Engine v1.0 (WebAssembly Driven)</p>
        </header>

        <main class="main" style="flex: 1; display: flex: 0 0 100;">
            <div class="nes-container with-title is-centered" style="flex: 1; display: flex; flex-direction: column; width: 100%; box-sizing: border-box;">
                <p class="title">GRAPH CONTROL PANEL</p>    
                
                <div style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-bottom: 20px;">
                    <div class="nes-field" style="width: 150px;">
                        <label for="node_id">Node ID</label>
                        <input type="text" id="node_id" class="nes-input" placeholder="A" maxlength="1">
                    </div>

                    <div class="nes-field" style="max-width: 600px;">
                        <label for="node_targets">Connect to (ID, ID...)</label>
                        <input type="text" id="node_targets" class="nes-input" placeholder="B, C">
                    </div>

                    <div style="align-self: flex-end; padding-bottom: 8px;">
                        <button type="button" id="add_node_btn" class="nes-btn is-success">ADD NODE</button>
                    </div>
                </div>

                <div class="nes-container is-dark canvas-container">
                    <canvas id="graph_canvas"></canvas>
                </div>
            </div>
        </main>    

  <div class="bottom">
    <div class=" footer-nav nes-container with-title is-centered"> 
      <p class="title">navbar</p>
        <a href="index.html" class="nav-item">HOME</a>
        <a href="theory.html" class="nav-item">THEORY</a>
        <a href="simulator.html" class="nav-item">SIMULATOR</a>
        <a href="about.html" class="nav-item">ABOUT</a>
    </div>
  </div>

  <footer>
      <p>© 2026 C-O.R.E Project | Licensed under GNU GPL v3</p>
  </footer>

    <script src="./bgmusic.js"></script>
    <script src="./algorithm.js"></script> 
    <script src="./simulator.js"></script>
<script>
    if (localStorage.getItem('crtEnabled') !== 'false') {
      document.body.classList.add('crt-on');
    }
</script>
</body>
</html>
